<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>
      Mini App
    </title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, &#39;SF Pro Text&#39;, &#39;Helvetica Neue&#39;, sans-serif;
  background: #0a0e14;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

.page { display:none; flex-direction:column; min-height:100vh; }
.page.active { display:flex; }

/* HOME */
#home {
  background:
    radial-gradient(ellipse 120% 40% at 50% 0%, #072030 0%, transparent 55%),
    linear-gradient(180deg, #060e16 0%, #050810 35%, #07080a 65%, #0c0904 100%);
  padding-bottom: 100px;
}

/* Track Invites */
.topbar { display:flex; justify-content:flex-end; padding:16px 14px 0; }
.track-btn {
  background: linear-gradient(160deg, #e0d4b8 0%, #c8bc96 50%, #b8a878 100%);
  box-shadow: 0 0 10px rgba(210,190,140,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
  border: none;
  border-radius: 16px;
  width: 82px;
  padding: 10px 8px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: opacity .15s;
}
.track-btn:active { opacity:.8; }
.track-btn svg { width:30px; height:30px; color:#1a1a1a; }
.track-btn span { font-size:11.5px; font-weight:700; color:#1a1a1a; line-height:1.2; text-align:center; }

/* Hero */
.hero { display:flex; flex-direction:column; align-items:center; padding:6px 20px 0; }
.duck-img {
  width: 160px;
  height: 160px;
  object-fit: contain;
  margin-bottom: 10px;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
}
.hero-title { font-size:20px; font-weight:800; text-align:center; line-height:1.35; color:#fff; margin-bottom:14px; }

/* Invite card */
.free-section {
  margin: 14px 10px 0;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 18px 14px 18px;
  background: rgba(255,255,255,0.02);
  position: relative;
}
.free-badge {
  position: absolute;
  top: -11px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a1520;
  padding: 0 10px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.invite-card { width:100%; background:#111a24; border-radius:20px; padding:18px 16px 16px; }

/* Telegram-style button: vibrant blue, slightly square rounded corners */
.invite-btn {
  width:100%;
  background: linear-gradient(180deg, #2d86ff 0%, #1a6ff0 100%);
  box-shadow:
    0 2px 0 rgba(0,0,0,0.25),
    0 4px 16px rgba(30,100,255,0.45),
    inset 0 1px 0 rgba(255,255,255,0.18);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:14px 16px;
  font-size:16px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  margin-bottom:14px;
  letter-spacing:0.1px;
  transition:opacity .15s, transform .1s;
}
.invite-btn:active { opacity:.85; transform:scale(0.98); }

.prog-track { height:12px; background:#1e2e3e; border-radius:99px; overflow:hidden; margin-bottom:8px; width:60%; margin-left:auto; margin-right:auto; }
.prog-fill { height:100%; background:#fff; border-radius:99px; width:5%; transition:width .5s; }
.prog-label { font-size:24px; font-weight:800; text-align:center; }
.prog-label .red { color:#e83030; }
.invite-note {
  margin-top: 10px;
  font-size: 11.5px;
  color: #7a9ab8;
  text-align: center;
  line-height: 1.55;
  padding: 0 4px;
}
.invite-note strong { color: #a8c4dc; font-weight: 700; }

/* Combined dopamine + features — one card, one gold border */
@keyframes gold-flash {
  0%, 100% { border-color: #b8922a; box-shadow: 0 0 20px rgba(180,140,30,0.12); }
  50% { border-color: #f0d060; box-shadow: 0 0 28px rgba(240,210,60,0.35), 0 0 50px rgba(255,240,150,0.12); }
}
.dopamine-card {
  margin:0;
  background:#050808;
  border-radius:0 0 0 0;
  border:1.5px solid #b8922a;
  border-bottom: none;
  padding:20px 16px 18px;
  box-shadow: 0 0 20px rgba(180,140,30,0.12);
  animation: gold-flash 3s ease-in-out infinite;
}
.dop-title { font-size:21px; font-weight:900; text-align:center; line-height:1.25; color:#fff; margin-bottom:14px; }
/* Red warning box — smaller, less prominent */
.warn-box { border:1.5px solid #c03318; border-radius:8px; padding:9px 10px; font-size:11.5px; line-height:1.6; text-align:center; color:#b8b8b8; }
.warn-box .warn-top { font-weight:700; margin-bottom:7px; font-size:11.5px; }
.warn-highlight {
  color: #fff;
  font-weight: 800;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
}
.warn-box mark { background: none; color: #ffffff; font-weight: 600; text-shadow: 0 0 8px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.2); }
.warn-box p { margin-bottom:7px; }
.warn-box p:last-child { margin-bottom:0; }

/* Features card — directly connected below dopamine card */
.features-card {
  margin:0;
  background:#0e1318;
  border-radius:0 0 20px 20px;
  border:1.5px solid #b8922a;
  border-top: none;
  padding:8px 16px 6px;
  box-shadow: 0 0 20px rgba(180,140,30,0.10);
  animation: gold-flash 3s ease-in-out infinite;
}
.feat-grid {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 0;
  align-items: start;
}
.feat-col {
  display: flex;
  flex-direction: column;
}
.feat-divider {
  background: rgba(255,255,255,0.08);
  align-self: stretch;
  margin: 6px 0;
}
.feat-row { display:flex; align-items:flex-start; gap:8px; padding:9px 8px; border-bottom:1px solid rgba(255,255,255,0.06); font-size:12.5px; font-weight:600; line-height:1.4; color:#efefef; }
.feat-last { border-bottom: none; }
.fi { font-size:16px; flex-shrink:0; margin-top:1px; }

.cta-section {
  margin-top: 18px;
  background: linear-gradient(180deg, #0a1520 0%, #050a0f 100%);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.07);
  padding: 18px 14px 16px;
}
.cta-title {
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  margin-bottom: 3px;
}
.cta-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 0.3px;
}
.joined-today {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 700;
  color: #7ecf9a;
  margin-bottom: 14px;
  letter-spacing: 0.1px;
}
.joined-dot {
  width: 7px; height: 7px;
  background: #2ecc71;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(46,204,113,0.8);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.3); opacity:0.7; }
}

.pay-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.pay-btn {
  border: none;
  border-radius: 14px;
  padding: 14px 10px 12px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  transition: opacity .15s, transform .1s;
  position: relative;
  overflow: hidden;
}
.pay-btn:active { opacity:.85; transform:scale(0.97); }

/* Card button — blue gradient like a real payment button */
.pay-btn-card {
  background: linear-gradient(180deg, #3a7bd5 0%, #1a55b0 60%, #0f3d8a 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.2),
    0 4px 18px rgba(30,80,200,0.5),
    0 0 30px rgba(50,100,255,0.2);
  border: 1px solid rgba(100,160,255,0.2);
}

/* Crypto button — gold/amber gradient */
.pay-btn-crypto {
  background: linear-gradient(180deg, #c8922a 0%, #a87020 60%, #7a4e10 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.2),
    0 4px 18px rgba(180,120,20,0.5),
    0 0 30px rgba(220,160,30,0.2);
  border: 1px solid rgba(220,170,60,0.25);
  overflow: visible;
}

.pay-btn-label {
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.pay-btn-logos {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pay-btn-action {
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.2px;
}

/* Sale tag */
.sale-tag {
  position: absolute;
  top: -10px;
  right: -8px;
  background: linear-gradient(135deg, #ff6b35, #e84393);
  color: #fff;
  font-size: 9px;
  font-weight: 800;
  padding: 4px 8px;
  border-radius: 20px;
  letter-spacing: 0.2px;
  box-shadow: 0 2px 10px rgba(255,80,80,0.5), 0 0 0 2px #0e1318;
  line-height: 1.2;
  text-align: center;
  white-space: nowrap;
  z-index: 10;
}

/* Visa logo */
.logo-visa {
  background: #1a1f71;
  color: #fff;
  font-size: 8px;
  font-weight: 900;
  font-style: italic;
  padding: 2px 5px;
  border-radius: 3px;
  letter-spacing: 1px;
}
/* Mastercard logo */
.logo-mc {
  display: flex;
  align-items: center;
}
.mc-circle {
  width: 14px; height: 14px; border-radius: 50%;
}
.mc-r { background: #eb001b; margin-right: -5px; }
.mc-y { background: #f79e1b; }

/* BTC logo */
.logo-btc {
  background: #f7931a;
  color: #fff;
  font-size: 8px;
  font-weight: 900;
  padding: 2px 5px;
  border-radius: 3px;
}
/* Monero logo */
.logo-xmr {
  background: #ff6600;
  color: #fff;
  font-size: 8px;
  font-weight: 900;
  padding: 2px 5px;
  border-radius: 3px;
}

/* Footer */
.footer { text-align:center; padding:22px 0 0; }
.footer-since { font-size:13.5px; color:#7a8a9a; margin-bottom:10px; font-style:italic; }
.footer-links { display:flex; justify-content:center; gap:32px; }
.footer-links a { color:#7a8a9a; font-size:12px; font-weight:500; text-decoration:underline; text-underline-offset:3px; letter-spacing:0px; }

/* PROFILE */
#profile {
  background:
    radial-gradient(ellipse 120% 35% at 50% 0%, #072030 0%, transparent 55%),
    linear-gradient(180deg, #060e16 0%, #050810 40%, #0c0904 100%);
  padding-bottom: 80px;
}
.prof-topbar { padding:14px 16px 0; }
.back-btn { background:none; border:none; color:#4a8cf5; font-size:17px; font-family:inherit; font-weight:400; cursor:pointer; display:flex; align-items:center; padding:0; gap:1px; }
.back-arrow { font-size:24px; line-height:1; margin-top:-1px; }



.prof-center { display:flex; flex-direction:column; align-items:center; padding:26px 16px 0; }
.avatar-box {
  width:86px; height:86px; border-radius:20px; overflow:hidden;
  background:linear-gradient(145deg, #c0b090, #907050);
  display:flex; align-items:center; justify-content:center; margin-bottom:10px;
}
.avatar-box img { width:100%; height:100%; object-fit:cover; }
.avatar-box svg { width:54px; height:54px; opacity:.9; }
.prof-name { font-size:17px; font-weight:700; color:#fff; margin-bottom:20px; }

.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; padding:0 10px; margin-bottom:18px; }
.stat-box { background:#fff; border-radius:16px; padding:16px 10px; text-align:center; color:#111; }
.stat-n { font-size:26px; font-weight:800; line-height:1; margin-bottom:3px; }
.stat-l { font-size:13px; font-weight:600; color:#555; }

.how-card { background:#0e1620; border-radius:18px; padding:20px 16px; margin:0 10px; border:1px solid rgba(255,255,255,0.06); }
.how-title { font-size:17px; font-weight:800; margin-bottom:16px; color:#fff; letter-spacing:0.1px; }
.how-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}
.how-step:last-child { margin-bottom: 0; }
.how-step-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2d6ef0, #1a4ec0);
  box-shadow: 0 2px 10px rgba(45,110,240,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  margin-top: 1px;
}
.how-step-text {
  font-size: 13.5px;
  line-height: 1.65;
  color: #b8ccd8;
  flex: 1;
}
.how-step-text strong { color: #ddeeff; font-weight: 700; }

.prof-footer { text-align:center; padding:24px 0 0; }
.prof-footer .footer-links { display:flex; justify-content:center; gap:32px; }
.prof-footer .footer-links a { color:#7a8a9a; font-size:12px; font-weight:500; text-decoration:underline; text-underline-offset:3px; letter-spacing:0px; line-height:1.6; }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  height:64px;
  background:#0e1620;
  display:flex;
  align-items:center;
  z-index:100;
  padding-bottom:4px;
}
.nav-home {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  background:none;
  border:none;
  font-family:inherit;
  font-size:11px;
  font-weight:500;
  color:#6a7a8a;
  cursor:pointer;
  padding-bottom:2px;
}
.nav-home-icon {
  width:24px; height:24px;
  stroke:#6a7a8a;
  fill:none;
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.nav-profile {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  border:none;
  font-family:inherit;
  cursor:pointer;
  padding-bottom:2px;
}
.nav-profile-pill {
  background: linear-gradient(180deg, #f5eedc 0%, #e8dfc0 100%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border-radius:14px;
  padding:8px 22px 7px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  min-width:80px;
}
.nav-profile-icon {
  width:22px; height:22px;
  stroke:#111;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.nav-profile-pill span {
  font-size:11px;
  font-weight:800;
  color:#111;
  letter-spacing:0.2px;
}

/* ── JOIN NOTIFICATION POPUP ── */
.join-notif {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  z-index: 9999;
  background: #1e2d3e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px;
  padding: 10px 16px 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  white-space: nowrap;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease;
  opacity: 0;
  pointer-events: none;
}
.join-notif.show {
  transform: translateX(-50%) translateY(0px);
  opacity: 1;
}
.join-notif.hide {
  transform: translateX(-50%) translateY(-80px);
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.notif-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  font-weight: 700;
  color: #fff;
}
.notif-text { display:flex; flex-direction:column; gap:1px; }
.notif-group { font-size:10px; font-weight:700; color:#5b9bd5; letter-spacing:0.2px; margin-bottom:1px; }
.notif-name { font-size:13px; font-weight:700; color:#fff; }
.notif-sub { font-size:11.5px; color:#7a9ab8; font-weight:500; }
.notif-dot {
  width: 8px; height: 8px;
  background: #2ecc71;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(46,204,113,0.7);
}
/* ── MEDIA NOTIFICATION (Telegram video/photo style) ── */
.media-notif {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%) translateY(-90px);
  z-index: 9999;
  background: #1a2535;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 9px 13px 9px 9px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);
  min-width: 230px;
  max-width: 290px;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease;
  opacity: 0;
  pointer-events: none;
}
.media-notif.show {
  transform: translateX(-50%) translateY(0px);
  opacity: 1;
}
.media-notif.hide {
  transform: translateX(-50%) translateY(-90px);
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.media-thumb {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}
.media-thumb canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.media-play {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.media-play svg {
  width: 18px;
  height: 18px;
  opacity: 0.9;
}
.media-info { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
.media-group { font-size:11px; font-weight:600; color:#5b9bd5; letter-spacing:0.1px; }
.media-sender { font-size:13px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.media-type { font-size:11.5px; color:#7a9ab8; display:flex; align-items:center; gap:3px; }

/* Premium badge + palm */
.premium-wrapper {
  position: relative;
  margin: 22px 10px 0;
}
.premium-badge {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  background: #050808;
  padding: 0 12px;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  z-index: 2;
}
.premium-text {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #c8922a;
  text-shadow: 0 0 10px rgba(200,146,42,0.6), 0 0 20px rgba(200,146,42,0.3);
}
@keyframes palm-sway {
  0%,100% { transform: rotate(-8deg) scale(1); filter: drop-shadow(0 0 3px rgba(200,160,40,0.6)); }
  25% { transform: rotate(0deg) scale(1.08); filter: drop-shadow(0 0 6px rgba(220,180,60,0.9)); }
  50% { transform: rotate(8deg) scale(1); filter: drop-shadow(0 0 3px rgba(200,160,40,0.6)); }
  75% { transform: rotate(0deg) scale(1.05); filter: drop-shadow(0 0 5px rgba(220,180,60,0.8)); }
}
.palm-icon {
  display: inline-flex;
  align-items: center;
  animation: palm-sway 2.5s ease-in-out infinite;
  transform-origin: bottom center;
}

/* Summer sale */
.summer-sale {
  margin-top: 18px;
  padding: 0 2px;
  position: relative;
}
.sale-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.sale-title {
  font-size: 13px;
  font-weight: 800;
  color: #ff8c35;
  letter-spacing: 0.5px;
  text-shadow: 0 0 8px rgba(255,120,40,0.4);
}
.sale-timer {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,140,50,0.65);
}
.sale-price-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 5px;
}
.sale-old-price {
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.3);
  text-decoration: line-through;
}
.sale-new-price {
  font-size: 24px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 14px rgba(255,140,40,0.5);
}
.sale-saving {
  font-size: 10px;
  font-weight: 800;
  background: linear-gradient(135deg, #ff6b20, #e84393);
  color: #fff;
  padding: 3px 8px;
  border-radius: 99px;
  box-shadow: 0 2px 8px rgba(255,80,30,0.35);
}
.sale-ends {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}
.sale-ends span { color: rgba(255,140,50,0.8); font-weight: 700; }

/* Group identity block */
.group-identity {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  padding: 12px 0 4px;
  gap: 9px;
}
.group-pfp-wrap {
  position: relative;
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}
.group-pfp {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  object-fit: cover;
  display: block;
}
/* Glowing animated border */
@keyframes border-glow {
  0%, 100% { box-shadow: 0 0 0 1.5px rgba(220,50,50,0.6), 0 0 10px rgba(220,50,50,0.35), 0 0 20px rgba(220,50,50,0.12); }
  50% { box-shadow: 0 0 0 1.5px rgba(255,80,80,0.9), 0 0 16px rgba(255,60,60,0.55), 0 0 28px rgba(255,40,40,0.2); }
}
.group-pfp-wrap::after {
  content: &#39;&#39;;
  position: absolute;
  inset: -2px;
  border-radius: 12px;
  border: 1.5px solid rgba(220,50,50,0.7);
  animation: border-glow 2.5s ease-in-out infinite;
  pointer-events: none;
}
.group-name-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.group-name-label {
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.1px;
  line-height: 1.2;
}
.group-sublabel {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 500;
}

/* Review badge */
@keyframes badge-shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.read-reviews-btn {
  width: 100%;
  background: #000;
  border: 1px solid rgba(42,130,228,0.25);
  border-top: none;
  border-radius: 0 0 14px 14px;
  color: #2a82e4;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  padding: 9px 14px;
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.2px;
  transition: background .15s;
}
.read-reviews-btn:active { background: rgba(42,130,228,0.1); }
@keyframes badge-pulse {
  0%,100% { box-shadow: 0 2px 12px rgba(42,130,228,0.25), 0 0 0 1px rgba(42,130,228,0.2); }
  50% { box-shadow: 0 2px 20px rgba(42,130,228,0.45), 0 0 0 1px rgba(42,130,228,0.35); }
}
.review-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #000;
  border: 1px solid rgba(42,130,228,0.25);
  border-bottom: none;
  border-radius: 14px 14px 0 0;
  padding: 10px 14px;
  margin: 10px 10px 0;
  animation: badge-pulse 3s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.review-badge::before {
  content: &#39;&#39;;
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(42,130,228,0.07) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: badge-shimmer 3s linear infinite;
}
.review-tg-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #2a82e4, #1a5fc8);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.review-text { flex: 1; min-width: 0; }
.review-title {
  font-size: 10px;
  font-weight: 700;
  color: #2a82e4;
  letter-spacing: 0.4px;
  margin-bottom: 2px;
  text-transform: uppercase;
}
.review-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 1px;
}
.review-star { color: #f5c842; font-size: 11px; line-height: 1; }
.review-rating { font-size: 13px; font-weight: 800; color: #fff; }
.review-count { font-size: 10.5px; color: rgba(255,255,255,0.4); font-weight: 500; }
.review-verified {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: #2a82e4;
  font-weight: 700;
  flex-shrink: 0;
  white-space: nowrap;
}
